x-common-env: &common-env
  VIDEO_SOURCE: ${VIDEO_SOURCE:-pexels}
  LLM_PROVIDER: ${LLM_PROVIDER:-openai}
  SUBTITLE_PROVIDER: ${SUBTITLE_PROVIDER:-edge}
  PROJECT_NAME: ${PROJECT_NAME:-MoneyPrinterTurbo-ES}
  PROJECT_DESCRIPTION: ${PROJECT_DESCRIPTION:-Fork hispano de MoneyPrinterTurbo listo para despliegue}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
  OPENAI_MODEL_NAME: ${OPENAI_MODEL_NAME:-gpt-5}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME:-gemini-2.0-flash}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
  DEEPSEEK_MODEL_NAME: ${DEEPSEEK_MODEL_NAME:-deepseek-chat}
  QWEN_API_KEY: ${QWEN_API_KEY:-}
  QWEN_MODEL_NAME: ${QWEN_MODEL_NAME:-qwen-max}
  PEXELS_API_KEYS: ${PEXELS_API_KEYS:-}
  PIXABAY_API_KEYS: ${PIXABAY_API_KEYS:-}
  AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
  AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-}
  SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
  ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
  ELEVENLABS_MODEL_ID: ${ELEVENLABS_MODEL_ID:-eleven_multilingual_v2}
  ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-}
  UI_LANGUAGE: ${UI_LANGUAGE:-es}
  UI_TTS_SERVER: ${UI_TTS_SERVER:-azure-tts-v1}
  UI_VOICE_NAME: ${UI_VOICE_NAME:-es-ES-ElviraNeural-Female}

services:
  webui:
    image: ${IMAGE_NAME:-enjiniatech/moneyprinterturbo-es:latest}
    container_name: moneyprinterturbo-es-webui
    ports:
      - "${WEBUI_PORT:-8501}:8501"
    environment:
      <<: *common-env
      PORT: 8501
      LISTEN_HOST: 0.0.0.0
    volumes:
      - ./storage:/MoneyPrinterTurbo/storage
    restart: unless-stopped

  api:
    image: ${IMAGE_NAME:-enjiniatech/moneyprinterturbo-es:latest}
    container_name: moneyprinterturbo-es-api
    command: ["/bin/sh", "-lc", "./api.sh"]
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      <<: *common-env
      PORT: 8080
      LISTEN_HOST: 0.0.0.0
    volumes:
      - ./storage:/MoneyPrinterTurbo/storage
    restart: unless-stopped
